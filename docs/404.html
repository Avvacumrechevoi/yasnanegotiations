<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0b0d"/>
<meta name="robots" content="noindex"/>
<title>Страница не найдена · Ясна</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700&family=Cormorant+Garamond:ital,wght@1,600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg-base:#0a0b0d; --bg-card:#16191C; --bg-tonal:#262A2E;
  --text-primary:#FEFEFE; --text-secondary:#A8B1BE; --text-tertiary:#626D7A;
  --border:rgba(255,255,255,.06); --accent:#0077FF; --accent-hover:#16A7FF;
  --accent-soft:rgba(0,119,255,.12); --accent-on:#fff;
  --font-sans:'Inter',system-ui,sans-serif; --font-display:'Manrope',system-ui,sans-serif;
  --font-serif:'Cormorant Garamond',Georgia,serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-base);color:var(--text-primary);font-family:var(--font-sans);min-height:100vh}
body{
  background:radial-gradient(ellipse 80% 60% at 50% 30%,rgba(0,119,255,.08) 0%,transparent 60%),var(--bg-base);
  display:flex;align-items:center;justify-content:center;padding:24px;
}
.e-card{max-width:520px;text-align:center}
.e-mark{font-family:var(--font-serif);font-style:italic;font-size:88px;line-height:1;color:var(--accent-hover);opacity:.9}
.e-code{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-tertiary);margin-top:8px}
.e-title{font-family:var(--font-display);font-size:30px;font-weight:700;margin-top:18px;letter-spacing:-.01em}
.e-desc{font-size:16px;line-height:1.6;color:var(--text-secondary);margin-top:12px}
.e-links{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:28px}
.e-btn{
  display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:100px;
  font-size:14px;font-weight:600;text-decoration:none;
  background:var(--bg-card);border:1px solid var(--border);color:var(--text-primary);
}
.e-btn--primary{background:var(--accent);border:none;color:var(--accent-on)}
.e-btn:hover{background:var(--bg-tonal)}
.e-btn--primary:hover{background:var(--accent-hover)}
</style>
</head>
<body>
  <div class="e-card">
    <div class="e-mark">✦</div>
    <div class="e-code">Ошибка 404</div>
    <h1 class="e-title">Такой страницы нет</h1>
    <p class="e-desc">Возможно, ссылка устарела или вы ошиблись адресом. Вернитесь на главную или загляните в один из разделов.</p>
    <div class="e-links">
      <a class="e-btn e-btn--primary" href="/yasnanegotiations/start.html">На главную</a>
      <a class="e-btn" href="/yasnanegotiations/index.html">Конструктор</a>
      <a class="e-btn" href="/yasnanegotiations/learn.html">Обучение</a>
      <a class="e-btn" href="/yasnanegotiations/duel.html">Игра</a>
      <a class="e-btn" href="/yasnanegotiations/negotiations.html">Переговоры</a>
    </div>
  </div>
</body>
</html>
