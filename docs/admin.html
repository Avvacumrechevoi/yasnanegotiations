<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ясна · Админка контента</title>
<link rel="stylesheet" href="styles.css"/>
<link rel="stylesheet" href="vk-tech-tokens.css"/>
<link rel="stylesheet" href="games/duel/duel-page.css"/>
<style>
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;background:#f5f5f7;color:#1d1d1f}
  .ad-shell{max-width:1100px;margin:0 auto;padding:24px}
  .ad-hdr{display:flex;align-items:center;justify-content:space-between;padding-bottom:14px;border-bottom:1px solid #e5e5ea;margin-bottom:24px}
  .ad-hdr h1{margin:0;font-family:ui-serif,Georgia,serif;font-size:22px;font-weight:600;letter-spacing:-0.01em}
  .ad-hdr-meta{font-size:12px;color:#86868b;letter-spacing:0.04em;text-transform:uppercase}
  .ad-tabs{display:flex;gap:4px;background:#e8e8ed;padding:4px;border-radius:10px;width:fit-content;margin-bottom:24px}
  .ad-tab{padding:8px 16px;border:0;background:transparent;border-radius:8px;font-size:13px;color:#1d1d1f;cursor:pointer;font-weight:500}
  .ad-tab.is-active{background:#fff;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  .ad-grid{display:grid;grid-template-columns:240px 1fr;gap:24px;align-items:start}
  @media(max-width:768px){.ad-grid{grid-template-columns:1fr}}
  .ad-themes{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:8px;position:sticky;top:24px}
  .ad-theme-row{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px}
  .ad-theme-row:hover{background:#f5f5f7}
  .ad-theme-row.is-active{background:#0071e3;color:#fff}
  .ad-theme-row.is-active .ad-theme-count{color:rgba(255,255,255,.7)}
  .ad-theme-count{font-size:11px;color:#86868b;font-variant-numeric:tabular-nums}
  .ad-questions{background:#fff;border:1px solid #e5e5ea;border-radius:12px;padding:18px}
  .ad-q-toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
  .ad-btn{padding:8px 14px;border:1px solid #d2d2d7;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#1d1d1f}
  .ad-btn:hover{background:#f5f5f7}
  .ad-btn-primary{background:#0071e3;color:#fff;border-color:#0071e3;font-weight:600}
  .ad-btn-primary:hover{background:#0058b8}
  .ad-btn-danger{background:#fff;color:#d70015;border-color:#fce0e3}
  .ad-btn-danger:hover{background:#fef2f2}
  .ad-q{padding:14px 16px;border:1px solid #e5e5ea;border-radius:10px;margin-bottom:8px;display:flex;align-items:start;gap:12px;font-size:13px;line-height:1.45}
  .ad-q-type{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#86868b;flex-shrink:0;width:84px;padding-top:2px}
  .ad-q-text{flex:1;color:#1d1d1f}
  .ad-q-text strong{display:block;font-weight:500;margin-bottom:4px}
  .ad-q-text small{display:block;color:#86868b;font-size:11px;margin-top:4px}
  .ad-q-actions{display:flex;gap:6px;flex-shrink:0}
  .ad-q-action{padding:5px 9px;border:1px solid #e5e5ea;background:#fff;border-radius:6px;font-size:11px;cursor:pointer;color:#424245}
  .ad-q-action:hover{background:#f5f5f7;color:#1d1d1f}
  .ad-empty{padding:60px 24px;text-align:center;color:#86868b;font-size:13px}
  .ad-form{display:flex;flex-direction:column;gap:14px}
  .ad-form label{display:block;font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:#86868b;margin-bottom:6px}
  .ad-form input[type=text],.ad-form select,.ad-form textarea{width:100%;padding:10px 12px;border:1px solid #d2d2d7;border-radius:8px;font-size:14px;font-family:inherit;background:#fff;box-sizing:border-box}
  .ad-form input:focus,.ad-form select:focus,.ad-form textarea:focus{outline:none;border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.15)}
  .ad-form textarea{min-height:80px;resize:vertical}
  .ad-options-list{display:flex;flex-direction:column;gap:8px}
  .ad-option-row{display:flex;align-items:center;gap:8px}
  .ad-option-row input[type=text]{flex:1}
  .ad-option-row input[type=radio],.ad-option-row input[type=checkbox]{flex-shrink:0;width:18px;height:18px;cursor:pointer}
  .ad-option-row .ad-btn{padding:6px 10px;font-size:12px}
  .ad-pairs-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .ad-stats{display:flex;gap:14px;font-size:12px;color:#86868b;padding:8px 12px;background:#f5f5f7;border-radius:8px;margin-bottom:14px;flex-wrap:wrap}
  .ad-stat strong{color:#1d1d1f;font-weight:600}
  .ad-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}
  .ad-modal{background:#fff;border-radius:14px;padding:24px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.2)}
  .ad-modal h3{margin:0 0 18px;font-family:ui-serif,Georgia,serif;font-size:18px;font-weight:600}
  .ad-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;border-top:1px solid #e5e5ea;padding-top:14px}
  .ad-export-pre{background:#1d1d1f;color:#a8b1be;padding:16px;border-radius:8px;font-family:'SF Mono',Menlo,monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto}
  .ad-warning{background:#fff8e6;border:1px solid #f6c64a;color:#5f4a08;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.5}
  .ad-info{background:#e6f3ff;border:1px solid #5b9cf6;color:#003d80;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px;line-height:1.5}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<!-- API endpoint (для publish/fetch ревизий контента) -->
<meta name="yasna:api" content="https://d5dmdje8c5mk8811il5j.iwzqm34r.apigw.yandexcloud.net"/>

<!-- Контент-бандл (Tier-1 baseline) + ContentStore (Tier-1+Tier-2 merge) -->
<script src="games/duel/content.bundle.js"></script>
<script src="core/content-store.js?v=1"></script>
<script src="admin.js?v=2"></script>
</body>
</html>
