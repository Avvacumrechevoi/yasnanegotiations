<!-- API endpoints (читаются клиентом из meta — позволяет инжектить через CI без правки исходников). -->
<!-- При деплое replace тегов через sed/envsubst, либо настройка через GitHub Actions secrets. -->
<meta name="yasna:api"    content="https://d5dmdje8c5mk8811il5j.iwzqm34r.apigw.yandexcloud.net"/>
<meta name="yasna:tg-bot" content="YasnaDuelBot"/>

<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<!-- React + Three.js + PeerJS из CDN — внешние библиотеки -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<!-- Читаем API config из meta-тегов в окно (для backward-compat с window.YASNA_*) -->
<script>
  (function(){
    var m = function(n){ var el = document.querySelector('meta[name="yasna:'+n+'"]'); return el ? el.getAttribute('content') : ''; };
    window.YASNA_LEADERBOARD_API = m('api') || '';
    window.YASNA_TG_BOT = m('tg-bot') || '';
  })();
</script>

<!-- Pre-built bundle (см. scripts/build.mjs · npm run build) -->
<!-- Включает: core/* + lessons/* + tours/* + games/duel/* + app.js -->
<!-- Без bundle браузер качал бы babel-standalone ~3MB и компилировал JSX в рантайме. -->
<script src="dist/app.min.js"></script>
</body>
