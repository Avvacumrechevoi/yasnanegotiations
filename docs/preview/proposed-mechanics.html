<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=5.0,user-scalable=yes,viewport-fit=cover"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<title>Ясна · Прототип 4 новых механик</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>"/>
<link rel="stylesheet" href="styles.css"/>
<style>
/* Этот превью-лист — единственное место, где разрешаем вертикальный скролл.
   В проде body{overflow:hidden;height:100vh}, у нас есть документация под Звездой. */
html,body{overflow:visible !important;height:auto !important;min-height:100vh !important}
body{background:var(--bg)}
.preview-shell{display:flex;flex-direction:column;min-height:100vh}
.star-area-pv{flex:0 0 auto !important;height:min(72vh,720px) !important;min-height:560px}
.pv-newmark{position:absolute;top:8px;left:14px;z-index:6;display:flex;align-items:center;gap:6px;
  background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.3);color:#7c3aed;
  padding:5px 10px;border-radius:14px;font-size:11px;font-weight:600;letter-spacing:.4px}
.pv-newmark::before{content:'●';font-size:8px}
.pv-docs{padding:48px 24px 80px;max-width:1100px;margin:0 auto;width:100%}
.pv-docs h2{font-family:var(--serif);font-size:26px;color:#1d1d1f;margin-bottom:8px;font-weight:700;letter-spacing:-.3px}
.pv-docs .lead{font-size:14px;color:#6e6e73;margin-bottom:32px;line-height:1.65;max-width:780px}
.pv-card{margin-bottom:50px;background:#fff;border:1px solid #e5e5ea;border-radius:14px;
  padding:24px 28px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.pv-card-h{display:flex;align-items:flex-start;gap:14px;margin-bottom:6px}
.pv-card-icon{font-size:30px;line-height:1;width:40px;text-align:center;flex-shrink:0;margin-top:2px}
.pv-card-h h3{font-size:19px;font-family:var(--serif);font-weight:700;margin-bottom:3px;letter-spacing:-.2px}
.pv-card-h .pv-sub{font-size:11px;color:#86868b;letter-spacing:.6px;text-transform:uppercase;font-weight:600}
.pv-card-body{padding-left:54px}
.pv-card-body p{font-size:14px;color:#424245;line-height:1.7;margin-top:10px}
.pv-card-body p b{color:#1d1d1f}
.pv-footer-note{margin-top:20px;padding:18px 22px;background:rgba(124,58,237,.05);
  border:1px dashed rgba(124,58,237,.3);border-radius:12px;font-size:13px;
  color:#581c87;line-height:1.6}
.pv-footer-note code{background:#fff;padding:2px 6px;border-radius:4px;font-size:12px;color:#7c3aed}
.pv-bridge{padding:14px 20px;background:linear-gradient(90deg,rgba(124,58,237,.05),rgba(124,58,237,.02));
  border-bottom:1px solid #e5e5ea;font-size:12.5px;color:#5b21b6;text-align:center;font-weight:500}
.pv-bridge b{color:#7c3aed}
@media(max-width:768px){
  .pv-docs{padding:24px 16px 60px}
  .pv-card{padding:18px 18px}
  .pv-card-body{padding-left:0;margin-top:14px}
  .pv-card-h h3{font-size:17px}
  .star-area-pv{height:min(60vh,560px) !important;min-height:420px}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel" src="core/yasna-star.js"></script>

<script type="text/babel">
const {useState, useMemo, useEffect} = React;
const {Star, T, FL} = window.YasnaCore;

// ─────────────────────────────────────────────────────────────────
// 4 новые механики (расширение FL). g='newmech' → отрисовка только
// в overlay поверх Star, не передаём в стандартный af.
// ─────────────────────────────────────────────────────────────────
const NEW_MECH = [
  {id:'mb_zodiac',         l:'Зодиак',               c:'#7c3aed', g:'newmech', short:'12 знаков на Полках'},
  {id:'mb_scorpio_spider', l:'Скорпион↔Паук',        c:'#dc2626', g:'newmech', short:'верх/низ + Поле Боя'},
  {id:'mb_mobius',         l:'Замыкание ∞',          c:'#0891b2', g:'newmech', short:'Лента Мёбиуса 11→0=12'},
  {id:'mb_accumulation',   l:'Накопление→Переход',   c:'#16a34a', g:'newmech', short:'Закон § Сутки'},
];

const ALL_FL = [...FL, ...NEW_MECH];

// Шаблоны, которые «закрепим» во вкладках (превью — 4 ясны на разных книгах).
const PREVIEW_TIDS = ['суток','знаки_з.','двора_животных','тела'];

// ─────────────────────────────────────────────────────────────────
// Геометрия Звезды — точно как в core/yasna-star.js (viewBox 0 0 900 700).
// ─────────────────────────────────────────────────────────────────
const CX=450, CY=350, R=215;
const xy = (i,r)=>{const a=(270-i*30)*Math.PI/180; return {x:CX+r*Math.cos(a), y:CY-r*Math.sin(a)};};

// ═════════════ OVERLAY: ЗОДИАК ═════════════════════════════════
function ZodiacRing(){
  const lr = R + 88;
  const symbols = ['♑','♒','♓','♈','♉','♊','♋','♌','♍','♎','♏','♐'];
  const names   = ['Козерог','Водолей','Рыбы','Овен','Телец','Близнецы','Рак','Лев','Дева','Весы','Скорпион','Стрелец'];
  return (
    <g>
      <circle cx={CX} cy={CY} r={lr+22} fill="none" stroke="#7c3aed" strokeWidth=".7" strokeDasharray="2 5" opacity=".55"/>
      <circle cx={CX} cy={CY} r={lr-18} fill="none" stroke="#7c3aed" strokeWidth=".5" opacity=".25"/>
      {symbols.map((s,i)=>{
        const p  = xy(i, lr);
        const np = xy(i, lr-32);
        return (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="14" fill="rgba(124,58,237,.07)" stroke="rgba(124,58,237,.35)" strokeWidth=".8"/>
            <text x={p.x} y={p.y+6.5} textAnchor="middle" fontSize="19" fontWeight="600" fill="#7c3aed">{s}</text>
            <text x={np.x} y={np.y} textAnchor="middle" fontSize="9" fill="#581c87" opacity=".75" fontWeight="500">{names[i]}</text>
          </g>
        );
      })}
    </g>
  );
}

// ═════════════ OVERLAY: СКОРПИОН ↔ ПАУК ═══════════════════════
function ScorpioSpider(){
  // Верхняя половина (Полки 4-8, голова) = Паук = «Сам».
  // Нижняя половина (Полки 10-2, грудь/таз) = Скорпион = «Особа».
  // Граница 3↔9 (Утро↔Закат) — Поле Боя.
  const p3 = xy(3, R), p9 = xy(9, R);
  const fillRed  = "rgba(220,38,38,.08)";
  const fillBlue = "rgba(37,99,235,.08)";
  return (
    <g>
      {/* Голова — верхняя дуга */}
      <path d={`M${p3.x},${p3.y} A${R},${R} 0 0,1 ${p9.x},${p9.y} L${p9.x},${CY-R-50} L${p3.x},${CY-R-50} Z`}
            fill={fillBlue} stroke="rgba(37,99,235,.4)" strokeWidth="1.4" strokeDasharray="6 4"/>
      <text x={CX} y={CY-R-22} textAnchor="middle" fontSize="22" opacity=".55">🕷</text>
      <text x={CX} y={CY-R+8} textAnchor="middle" fontSize="13" fill="#1d4ed8" fontWeight="700">Головной Паук · Сам</text>
      <text x={CX} y={CY-R+24} textAnchor="middle" fontSize="10.5" fill="#1e3a8a" opacity=".75">Полки 4–8 · идея, контроль, мозг</text>

      {/* Грудь/Таз — нижняя дуга */}
      <path d={`M${p3.x},${p3.y} A${R},${R} 0 0,0 ${p9.x},${p9.y} L${p9.x},${CY+R+50} L${p3.x},${CY+R+50} Z`}
            fill={fillRed} stroke="rgba(220,38,38,.4)" strokeWidth="1.4" strokeDasharray="6 4"/>
      <text x={CX} y={CY+R+28} textAnchor="middle" fontSize="22" opacity=".55">🦂</text>
      <text x={CX} y={CY+R+8} textAnchor="middle" fontSize="13" fill="#b91c1c" fontWeight="700">Грудной Скорпион · Особа</text>
      <text x={CX} y={CY+R+24} textAnchor="middle" fontSize="10.5" fill="#7f1d1d" opacity=".75">Полки 10–2 · тело, импульс, чакры</text>

      {/* Поле Боя — линия 3↔9 */}
      <line x1={p3.x-26} y1={p3.y} x2={p9.x+26} y2={p9.y}
            stroke="#7c2d12" strokeWidth="2" strokeDasharray="3 4" opacity=".55"/>
      <rect x={CX-72} y={CY-12} width="144" height="24" rx="12"
            fill="#fff" stroke="#7c2d12" strokeWidth="1.4"/>
      <text x={CX} y={CY+5} textAnchor="middle" fontSize="11" fill="#7c2d12" fontWeight="700" letterSpacing="1.5">⟵ ПОЛЕ БОЯ ⟶</text>
    </g>
  );
}

// ═════════════ OVERLAY: ЛЕНТА МЁБИУСА (ЗАМЫКАНИЕ ∞) ═══════════
function MobiusArc(){
  const p11 = xy(11, R);
  const p0  = xy(0, R);
  const p1  = xy(1, R);
  const arcD = `M${p11.x},${p11.y} Q${CX-100},${CY+R+90} ${CX},${CY+R+95} Q${CX+100},${CY+R+90} ${p1.x},${p1.y}`;
  return (
    <g>
      <path d={arcD} fill="none" stroke="#0891b2" strokeWidth="3.5" strokeLinecap="round" opacity=".85"/>
      <path d={arcD} fill="none" stroke="#67e8f9" strokeWidth="1.4" strokeLinecap="round" strokeDasharray="6 6" opacity=".7"/>

      {/* Маркер 0 = 12 на нижней Полке */}
      <circle cx={p0.x} cy={p0.y+44} r="22" fill="#fff" stroke="#0891b2" strokeWidth="2"/>
      <text x={p0.x} y={p0.y+50} textAnchor="middle" fontSize="13" fill="#0891b2" fontWeight="800">0=12</text>

      {/* Стрелочки направления */}
      <text x={CX-96} y={CY+R+86} fontSize="22" fill="#0891b2" fontWeight="700">›</text>
      <text x={CX+85}  y={CY+R+86} fontSize="22" fill="#0891b2" fontWeight="700">›</text>

      {/* Знак ∞ под аркой */}
      <text x={CX} y={CY+R+125} textAnchor="middle" fontSize="34" fill="#0891b2" fontWeight="600">∞</text>
      <text x={CX} y={CY+R+148} textAnchor="middle" fontSize="11" fill="#0e7490" fontWeight="700">конец = новое начало</text>
    </g>
  );
}

// ═════════════ OVERLAY: НАКОПЛЕНИЕ → ПЕРЕХОД ══════════════════
function AccumulationBars(){
  const longs = [0,3,6,9];
  return (
    <g>
      <defs>
        <marker id="acc-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
        </marker>
      </defs>
      {longs.map(i=>{
        const p   = xy(i, R);
        const np1 = xy((i+1)%12, R);
        const np2 = xy((i+11)%12, R);
        return (
          <g key={i}>
            <circle cx={p.x} cy={p.y} r="42" fill="rgba(22,163,74,.16)" stroke="#16a34a" strokeWidth="1.6" strokeDasharray="3 3"/>
            <circle cx={p.x} cy={p.y} r="62" fill="none" stroke="#16a34a" strokeWidth=".8" opacity=".4"/>
            <line x1={p.x} y1={p.y} x2={np1.x} y2={np1.y} stroke="#16a34a" strokeWidth="2" markerEnd="url(#acc-arr)" opacity=".7" strokeDasharray="4 3"/>
            <line x1={p.x} y1={p.y} x2={np2.x} y2={np2.y} stroke="#16a34a" strokeWidth="2" markerEnd="url(#acc-arr)" opacity=".7" strokeDasharray="4 3"/>
          </g>
        );
      })}
      <text x={CX} y={CY+R+170} textAnchor="middle" fontSize="11" fill="#15803d" fontWeight="700" letterSpacing=".5">
        Длинная копит → перелив в соседние короткие (закон § Сутки)
      </text>
    </g>
  );
}

function NewMechOverlay({af}){
  const active = af.filter(a => NEW_MECH.find(m=>m.id===a));
  if(active.length===0) return null;
  return (
    <svg viewBox="0 0 900 700"
         preserveAspectRatio="xMidYMid meet"
         style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
      {af.includes('mb_zodiac')         && <ZodiacRing/>}
      {af.includes('mb_scorpio_spider') && <ScorpioSpider/>}
      {af.includes('mb_mobius')         && <MobiusArc/>}
      {af.includes('mb_accumulation')   && <AccumulationBars/>}
    </svg>
  );
}

// ═════════════ ОПИСАНИЯ ДЛЯ ДОК-СЕКЦИИ ═══════════════════════
const DOC_BLOCKS = [
  {id:'mb_zodiac', icon:'♑', color:'#7c3aed',
   title:'Зодиак', subtitle:'M-Г-040 / M-К-005 · универсальная',
   text:[
    'Все 12 Полок любой Ясны можно соотнести со знаками Зодиака. Это **универсальный круг времени**, доказывающий изоморфию Сутки↔Год↔Жизнь.',
    'Ключевые точки: Полка 0 = ♑ Козерог · Полка 3 = ♈ Овен · Полка 6 = ♋ Рак · Полка 9 = ♎ Весы. На каждой Полке тот же знак отвечает за тот же режим во всех трёх Яснах.',
    '**Источник:** «Ясна Года», узел 8, пп. 491–570 — формула созвездий + тело Змея Питона из 12 Зодиак-Мифов.'
   ]},
  {id:'mb_scorpio_spider', icon:'🦂', color:'#dc2626',
   title:'Скорпион ↔ Паук', subtitle:'M-Ж-118 · главный образ Жизни',
   text:[
    'Тело человека — и любая 12-Полочная Ясна — делятся по горизонтали на **Грудного Скорпиона** (низ, тело, импульс, «Особа») и **Головного Паука** (верх, голова, идея, «Сам»).',
    'Между ними — **Поле Боя** на оси 3↔9. Здесь решается, кто управляет циклом: телесный импульс снизу или контроль сверху.',
    'Перенос на любую Ясну: верхняя половина круга — про разум/намерение/проект, нижняя — про тело/материю/реализацию.',
    '**Источник:** «Ясна Жизни», узлы 7–8, пп. ~342–530 (анатомия 7 чакр + Манипула + Скхват + Стан + Гужи).'
   ]},
  {id:'mb_mobius', icon:'∞', color:'#0891b2',
   title:'Замыкание ∞ (Лента Мёбиуса)', subtitle:'M-Г-050 · структурный закон',
   text:[
    'Полка 11 переходит в Полку 0 = Полку 12. **Конец = новое начало.** Цикл не рассыпается в линию, а замыкается в круг через парадокс «0=12».',
    'В Сутках: Полночь → Утро. В Году: Зима → Весна. В Жизни: Смерть → Зачатие нового цикла. **Принцип универсален**, его нельзя пропустить ни в одной Ясне.',
    'Конкретный мифологический образ Змея Питона со звёздным телом — частная иконография «Ясны Года» (узел 8, пп. 569–570). В других книгах тот же закон одет в свои образы.'
   ]},
  {id:'mb_accumulation', icon:'⤴', color:'#16a34a',
   title:'Накопление → Переход', subtitle:'§ Ясна Суток · M-К-007',
   text:[
    'На длинных Полках (0, 3, 6, 9) накапливается материал/энергия. По достижении лимита накопление **переливается в соседние короткие Полки** (1, 2, 4, 5, 7, 8, 10, 11).',
    'Это **Закон Перехода Количества в Качество**, привязанный к 12-Полочной структуре. Длинные Полки — резервуары; короткие — точки перехода (искры, заслонки, переломы).',
    'В Сутках: Ночь (Полка 0) копит тьму → Искра (1) и Заря (2) — точки перелива. В Жизни: Полка 0 = Зачатие копит до Рождения (Полка 1) и Имени (Полка 2).',
    '**Источник:** «Ясна Суток», узел 5, базовый закон скоростей света/тьмы.'
   ]}
];

function DocSection(){
  return (
    <div className="pv-docs">
      <h2>Что добавляют 4 новые механики</h2>
      <p className="lead">
        Эти механики отсутствуют в текущем фильтре Ясна-Конструктора, но встречаются во всех трёх книгах
        корпуса (Сутки · Год · Жизнь) и являются <b>универсальными для любой 12-Полочной Ясны</b>.
        Включите их в верхней панели «Механики» — наложение появится прямо на Звезде.
      </p>

      {DOC_BLOCKS.map(m=>(
        <div key={m.id} className="pv-card">
          <div className="pv-card-h">
            <span className="pv-card-icon" style={{color:m.color}}>{m.icon}</span>
            <div style={{flex:1}}>
              <h3 style={{color:m.color}}>{m.title}</h3>
              <div className="pv-sub">{m.subtitle}</div>
            </div>
          </div>
          <div className="pv-card-body">
            {m.text.map((t,i)=>(
              <p key={i} dangerouslySetInnerHTML={{__html: t.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>')}}/>
            ))}
          </div>
        </div>
      ))}

      <div className="pv-footer-note">
        <b>Что дальше.</b> Если предложение принимается — эти 4 механики добавляются в массив <code>FL</code>
        в файле <code>core/yasna-star.js</code>, а их SVG-наложения переносятся в компонент <code>Star</code>.
        Глоссарий, Инструкция и Верификация — расширяются записями для каждой новой механики.
      </div>
    </div>
  );
}

// ═════════════ ПРИЛОЖЕНИЕ ════════════════════════════════════
function App(){
  const ptT = useMemo(()=>PREVIEW_TIDS.map(id=>T.find(t=>t.id===id)).filter(Boolean), []);
  const [yId, setYId] = useState(ptT[0]?.id || T[0].id);
  const y = useMemo(()=>T.find(t=>t.id===yId) || T[0], [yId]);
  const [af, setAf] = useState([]);
  const [sel, setSel] = useState(null);

  const tog = (id)=> setAf(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]);

  // Только стандартные FL передаём в Star — новые рисует overlay сверху.
  const standardAf = af.filter(a => FL.find(f=>f.id===a));
  const newCount = af.filter(a => NEW_MECH.find(m=>m.id===a)).length;

  return (
    <div className="preview-shell">
      {/* ═══════ HEADER (1:1 как в проде) ═══════ */}
      <div className='hdr' style={{display:'flex',alignItems:'center',padding:'10px 20px',background:'var(--bg2)',borderBottom:'1px solid rgba(0,0,0,.06)',flexShrink:0,minHeight:56}}>
        <span style={{fontSize:20,color:'#0071e3',marginRight:6}}>✦</span>
        <span className='hdr-brand-desk' style={{fontFamily:'var(--serif)',fontSize:17,color:'#1d1d1f',fontWeight:700,marginRight:12,letterSpacing:-0.3}}>Ясна</span>
        <span className='hdr-title hdr-title-desk' style={{fontFamily:'var(--serif)',fontSize:18,color:'#6e6e73',fontWeight:500,marginRight:6,paddingLeft:12,borderLeft:'1px solid #d2d2d7'}}>Прототип · 4 новые механики</span>
        <span className='hdr-title-mob' style={{display:'none',fontFamily:'var(--serif)',fontSize:18,color:'#1d1d1f',fontWeight:700,marginRight:6,letterSpacing:-0.2}}>Прототип</span>

        <div style={{flex:1}}/>
        <div className='hdr-btns' style={{display:'flex',gap:6,alignItems:'center'}}>
          <a href="../" style={{textDecoration:'none'}}>
            <button style={{border:'1px solid #d2d2d7',color:'#424245',padding:'7px 14px',borderRadius:8,fontSize:13,background:'#fff',cursor:'pointer',fontWeight:500}}>← Конструктор</button>
          </a>
          <button onClick={()=>setAf(NEW_MECH.map(m=>m.id))} style={{border:'1px solid rgba(124,58,237,.4)',color:'#7c3aed',padding:'7px 14px',borderRadius:8,fontSize:13,background:'rgba(124,58,237,.06)',cursor:'pointer',fontWeight:600}}>Только новые</button>
          <button onClick={()=>setAf([])} style={{border:'1px solid #d2d2d7',color:'#424245',padding:'7px 14px',borderRadius:8,fontSize:13,background:'#fff',cursor:'pointer',fontWeight:500}}>Сброс</button>
        </div>
      </div>

      {/* ═══════ Бейдж-мостик ═══════ */}
      <div className="pv-bridge">
        Это <b>превью-страница</b> с предложением 4 новых универсальных механик. Внешний вид и логика — идентичны
        проду; новое — это 4 кнопки в фильтре справа и их SVG-наложения на Звезду.
      </div>

      {/* ═══════ NAV TABS (1:1 как в проде) ═══════ */}
      <div className='nav-tabs' style={{display:'flex',alignItems:'center',padding:'8px 0 8px 20px',background:'var(--bg2)',borderBottom:'1px solid #d2d2d7',flexShrink:0}}>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:4,overflowX:'auto',minWidth:0,scrollbarWidth:'none',msOverflowStyle:'none'}} className="hide-scroll">
          {ptT.map(t=>(
            <button key={t.id} onClick={()=>{setYId(t.id);setSel(null)}}
              style={{position:'relative',padding:t.rubrik?'6px 14px 6px 18px':'6px 14px',borderRadius:16,fontSize:13,whiteSpace:'nowrap',
                background:y.id===t.id?'rgba(0,122,255,.08)':'transparent',
                color:y.id===t.id?'#0071e3':'var(--txt2)',
                border:`1px solid ${y.id===t.id?'rgba(0,122,255,.35)':'transparent'}`,
                fontWeight:y.id===t.id?600:400,cursor:'pointer',overflow:'hidden'}}>
              {t.rubrik && <span style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:'#30A060'}} title="Верифицирована"/>}
              {t.n}
            </button>
          ))}
        </div>
        <div className='nav-right' style={{display:'flex',alignItems:'center',gap:5,paddingRight:20,paddingLeft:10,flexShrink:0,background:'var(--bg2)',borderLeft:'1px solid #e5e5ea'}}>
          <span style={{fontSize:12,color:'#86868b',fontStyle:'italic',whiteSpace:'nowrap'}}>превью · 4 ясны</span>
        </div>
      </div>

      {/* ═══════ FILTERS — 12 прод + 4 NEW ═══════ */}
      <div className='filters hide-scroll' style={{display:'flex',gap:5,padding:'10px 20px',flexWrap:'wrap',flexShrink:0,alignItems:'center'}}>
        <span style={{fontSize:12,color:'#6e6e73',padding:'4px 0',whiteSpace:'nowrap',marginRight:4,fontWeight:500}}>Механики:</span>
        {af.length===ALL_FL.length
          ? <button onClick={()=>setAf([])} style={{padding:'6px 14px',borderRadius:16,fontSize:13,whiteSpace:'nowrap',background:'#0071e322',color:'#0071e3',border:'1px solid #0071e355',fontWeight:600,cursor:'pointer'}}>Все</button>
          : <button onClick={()=>setAf(ALL_FL.map(f=>f.id))} style={{padding:'6px 14px',borderRadius:16,fontSize:13,whiteSpace:'nowrap',background:'transparent',color:'#86868b',border:'1px solid #d2d2d7',cursor:'pointer'}}>Все</button>
        }
        {ALL_FL.map((f,fi)=>{
          const a = af.includes(f.id);
          const prevG = fi>0 ? ALL_FL[fi-1].g : '';
          const showSep = f.g!==prevG && fi>0;
          const isNew = f.g==='newmech';
          return <React.Fragment key={f.id}>
            {showSep && <div className='sep' style={{width:1,height:18,background:'#d2d2d7',margin:'0 4px',flexShrink:0}}/>}
            {showSep && isNew && <span style={{fontSize:9,color:'#7c3aed',fontWeight:800,letterSpacing:1.5,padding:'0 6px',whiteSpace:'nowrap'}}>NEW</span>}
            <button onClick={()=>tog(f.id)}
              title={isNew?f.short:''}
              style={{padding:'6px 14px',borderRadius:16,fontSize:13,whiteSpace:'nowrap',
                background:a?`${f.c}22`:'transparent',
                color:a?f.c:(isNew?f.c+'cc':'#86868b'),
                border:`1px solid ${a?f.c+'55':(isNew?f.c+'55':'#d2d2d7')}`,
                cursor:'pointer',fontWeight:a?600:(isNew?500:400),
                position:'relative'}}>
              {f.l}
              {isNew && !a && <span style={{position:'absolute',top:-3,right:-3,width:6,height:6,borderRadius:'50%',background:f.c,border:'1.5px solid #fff'}}/>}
            </button>
          </React.Fragment>;
        })}
      </div>

      {/* ═══════ STAR + новый OVERLAY ═══════ */}
      <div className='star-area star-area-pv'
           style={{display:'flex',alignItems:'center',justifyContent:'center',position:'relative',overflow:'hidden'}}
           onClick={e=>{if(e.target===e.currentTarget) setSel(null)}}>
        {newCount>0 && <div className="pv-newmark">{newCount} новых наложений активно</div>}
        <div style={{width:'100%',height:'100%',maxWidth:900,maxHeight:700,position:'relative'}}>
          <Star yy={y} sel={sel} onSel={setSel} hl={null} af={standardAf}
                showOpp={standardAf.includes('opp')} overlay={null} mob={false}/>
          <NewMechOverlay af={af}/>
        </div>
      </div>

      {/* ═══════ DOC секция под Звездой ═══════ */}
      <DocSection/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
