<!-- ═══ Theme Toggle — только в preview ═══════════════════════
     Переключатель экспериментальной темной темы. Применяет/снимает
     класс `theme-vk-dark` на body. Состояние в localStorage.
     ─────────────────────────────────────────────────────────── -->
<script>
(function(){
  'use strict';
  var STORAGE_KEY = 'yasna_theme_vk_dark';
  var BODY_CLASS = 'theme-vk-dark';

  function isOn(){
    try { return localStorage.getItem(STORAGE_KEY) === '1'; }
    catch(_){ return false; }
  }
  function apply(on){
    // VK-вёрстка (широкий контейнер, сетки) — ВСЕГДА. Цвет: светлый по
    // умолчанию (класс vk-light), тёмный — когда on=true (снимаем vk-light).
    document.body.classList.add(BODY_CLASS);
    document.body.classList.toggle('vk-light', !on);
    var btn = document.getElementById('dp-theme-toggle');
    if(btn){
      var icon = btn.querySelector('.dp-theme-toggle-icon');
      if(icon) icon.textContent = on ? '☀' : '🌑';
      btn.setAttribute('aria-pressed', on ? 'true' : 'false');
      btn.title = on ? 'Светлая тема' : 'Тёмная тема';
    }
  }
  function toggle(){
    var next = !isOn();
    try { localStorage.setItem(STORAGE_KEY, next ? '1' : '0'); } catch(_){}
    apply(next);
  }

  // Применяем при загрузке (до первой отрисовки если возможно)
  apply(isOn());

  // ─── Кнопка теперь icon-only 32×32, инжектится В header (.dp-header-auth)
  //     перед кнопкой «Войти/?». MutationObserver re-инжектит если React
  //     пере-смонтировал хедер. ───
  function makeButton(){
    var btn = document.createElement('button');
    btn.id = 'dp-theme-toggle';
    btn.className = 'dp-theme-toggle dp-theme-toggle--header';
    btn.type = 'button';
    // Icon only — никаких label-span'ов
    btn.innerHTML = '<span class="dp-theme-toggle-icon" aria-hidden="true">🌑</span>';
    btn.addEventListener('click', toggle);
    return btn;
  }
  function mountButton(){
    if(document.getElementById('dp-theme-toggle')) return;
    var auth = document.querySelector('.dp-header-auth');
    var btn = makeButton();
    if(auth){
      // Вставляем ПЕРЕД help-btn (?) если есть, иначе в начало auth
      var helpBtn = auth.querySelector('.dp-help-btn');
      if(helpBtn){
        auth.insertBefore(btn, helpBtn);
      } else {
        auth.insertBefore(btn, auth.firstChild);
      }
    } else {
      // Fallback: если хедер ещё не отрендерен — кладём на body как раньше
      document.body.appendChild(btn);
    }
    apply(isOn());
  }
  function startObserver(){
    mountButton();
    var obs = new MutationObserver(function(){
      // Если кнопка пропала (React re-mount) — инжектим заново
      if(!document.getElementById('dp-theme-toggle')){
        mountButton();
      } else {
        // Если кнопка осталась на body, а .dp-header-auth уже появился — переносим внутрь
        var btn = document.getElementById('dp-theme-toggle');
        var auth = document.querySelector('.dp-header-auth');
        if(btn && auth && btn.parentElement === document.body){
          var helpBtn = auth.querySelector('.dp-help-btn');
          if(helpBtn) auth.insertBefore(btn, helpBtn);
          else auth.insertBefore(btn, auth.firstChild);
        }
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', startObserver);
  } else {
    startObserver();
  }
})();
</script>
